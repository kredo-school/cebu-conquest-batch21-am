<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Socket.IO テストクライアント</title>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
</head>
<body>
    <h1>セブとり合戦 - 通信テスト</h1>
    <p>F12キーを押して、開発者ツールの「コンソール(Console)」タブを開いてください。</p>
    
    <button onclick="sendMoveEvent()">右へ移動する (player_move)</button>
    <button onclick="sendClaimEvent()">陣地を獲得する (territory_claimed)</button>
    <button onclick="sendAttackEvent()">陣地へ攻撃する (attack_territory)</button>

    <script>
        // けいさんの立ち上げたサーバーへ接続！
        const socket = io('http://localhost:3001');

        // 接続成功時のイベント
        socket.on('connect', () => {
            console.log('✅ サーバーに接続成功！ Socket ID:', socket.id);
        });

        // サーバーから「現在の全体ステート」を受け取った時
        socket.on('current_state', (state) => {
            console.log('🗺️ 現在のマップ状態を受信:', state);
        });

        // サーバーから「状態更新」を受け取った時
        socket.on('state_update', (state) => {
            console.log('🔄 誰かが移動しました！最新状態:', state);
        });

        // サーバーから「陣地更新」を受け取った時
        socket.on('territory_update', (territories) => {
            console.log('🚩 陣地が更新されました！:', territories);
        });

        // サーバーから1秒ごとに送られてくる「正の世界」を受信
        socket.on('sync_state', (state) => {
            console.log('⏱️ [Tick] 全体ステート同期:', state);
        });

        // --- テスト用の送信関数 ---
        function sendMoveEvent() {
            // 適当な座標に移動したテイでデータを送る
            const mockX = Math.floor(Math.random() * 100);
            const mockY = Math.floor(Math.random() * 100);
            console.log(`🚀 移動イベント送信: x=${mockX}, y=${mockY}`);
            socket.emit('player_move', { x: mockX, y: mockY });
        }

        function sendClaimEvent() {
            // セブ市街地のサント・ニーニョ教会(id:101)を獲得したテイでデータを送る
            console.log('⚔️ サント・ニーニョ教会の獲得イベント送信！');
            socket.emit('territory_claimed', { territoryId: 101 });
        }

        // テスト用の攻撃送信関数を追加
        function sendAttackEvent() {
            // サント・ニーニョ教会(id:101)に、自分の攻撃力(ATK=100)で攻め込むテスト
            console.log('⚔️ 攻撃力100でサント・ニーニョ教会に突撃！');
            socket.emit('attack_territory', { territoryId: 101, attackerAtk: 100 });
        }
    </script>
</body>
</html>
